server {
    listen 80;
    server_name zjedz.it www.zjedz.it;
    
    location / {
        root /usr/share/nginx/html;
        index index.html;
    }
    
    access_log /var/log/nginx/landing_access.log;
    error_log /var/log/nginx/landing_error.log;
}

server {
    listen 80;
    server_name elvis.zjedz.it;

    location / {
        proxy_pass http://elvis_app:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    access_log /var/log/nginx/elvis_access.log;
    error_log /var/log/nginx/elvis_error.log;
}

