# Elvis Docker Infrastructure - Stable v2.1 (UTF-8)
services:
  postgres:
    image: postgres:15-alpine
    container_name: zjedzit_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PG_APPUSER}
      POSTGRES_PASSWORD: ${PG_APPPASS}
      POSTGRES_DB: ${PG_DB}
    volumes:
    - ovh_pg_data:/var/lib/postgresql/data
    networks:
    - elvis_net
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U ${PG_APPUSER} -d ${PG_DB}
      interval: 10s
      timeout: 5s
      retries: 10
  app:
    build:
      context: /home/debian/truck-menu
      dockerfile: Dockerfile
    container_name: zjedzit_app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${PG_APPUSER}:${PG_APPPASS}@postgres:5432/${PG_DB}
      DOMAIN_ROOT: ${DOMAIN_ROOT}
      DASH_ADMIN_TOKEN: ${DASH_ADMIN_TOKEN}
      SYSTEM_MODE: ${SYSTEM_MODE}
      BRAND: ${BRAND}
      DOCKER_HOST: unix:///var/run/docker.sock
    volumes:
    - ..:/app:cached
    - /var/run/docker.sock:/var/run/docker.sock
    networks:
    - elvis_net
  caddy:
    image: caddy:latest
    container_name: zjedzit_caddy
    restart: unless-stopped
    ports:
    - 80:80
    - 443:443
    networks:
    - elvis_net
    volumes:
    - ./Caddyfile:/etc/caddy/Caddyfile:ro
    - ./index.html:/var/www/html/index.html:ro
    - caddy_data:/data
    - caddy_config:/config
  stary_db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: marcin
      POSTGRES_PASSWORD: Haslo123!
      POSTGRES_DB: saas_db
    networks:
    - elvis_net
    container_name: stary_db
  stary_app:
    build:
      context: ..
      dockerfile: Dockerfile
    image: ovh-app
    container_name: stary_app
    restart: always
    environment:
    - DATABASE_URL=postgresql://marcin:Haslo123!@stary_db:5432/saas_db
    - BRAND=STARY
    depends_on:
    - stary_db
    volumes:
    - ..:/app:cached
    - /var/run/docker.sock:/var/run/docker.sock
    networks:
    - elvis_net
  nowy_db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: marcin
      POSTGRES_PASSWORD: Haslo123!
      POSTGRES_DB: saas_db
    networks:
    - elvis_net
    container_name: nowy_db
  nowy_app:
    build:
      context: ..
      dockerfile: Dockerfile
    image: ovh-app
    container_name: nowy_app
    restart: always
    environment:
    - DATABASE_URL=postgresql://marcin:Haslo123!@nowy_db:5432/saas_db
    - BRAND=NOWY
    depends_on:
    - nowy_db
    volumes:
    - ..:/app:cached
    - /var/run/docker.sock:/var/run/docker.sock
    networks:
    - elvis_net
networks:
  elvis_net:
    driver: bridge
volumes:
  ovh_pg_data: null
  caddy_data: null
  caddy_config: null
