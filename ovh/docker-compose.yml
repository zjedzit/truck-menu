# Zjedz.it Docker Infrastructure - Stable v2.1 (UTF-8)
services:
  postgres:
    image: postgres:15-alpine
    container_name: zjedzit_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PG_APPUSER}
      POSTGRES_PASSWORD: ${PG_APPPASS}
      POSTGRES_DB: ${PG_DB}
    volumes:
    - ovh_pg_data:/var/lib/postgresql/data
    networks:
    - zjedzit_net
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U ${PG_APPUSER} -d ${PG_DB}
      interval: 10s
      timeout: 5s
      retries: 10
  app:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: zjedzit_app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${PG_APPUSER}:${PG_APPPASS}@postgres:5432/${PG_DB}
      DOMAIN_ROOT: ${DOMAIN_ROOT}
      DASH_ADMIN_TOKEN: ${DASH_ADMIN_TOKEN}
      SYSTEM_MODE: ${SYSTEM_MODE}
      BRAND: ${BRAND}
      DOCKER_HOST: unix:///var/run/docker.sock
    volumes:
    - ..:/app:cached
    - /var/run/docker.sock:/var/run/docker.sock
    networks:
    - zjedzit_net
  caddy:
    image: caddy:latest
    container_name: zjedzit_caddy
    restart: unless-stopped
    ports:
    - 80:80
    - 443:443
    volumes:
    - ./Caddyfile:/etc/caddy/Caddyfile:ro
    - ./index.html:/var/www/html/index.html:ro
    - caddy_data:/data
    - caddy_config:/config
    networks:
    - zjedzit_net
networks:
  zjedzit_net:
    driver: bridge
volumes:
  ovh_pg_data: null
  caddy_data: null
  caddy_config: null
