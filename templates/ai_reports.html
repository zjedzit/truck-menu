<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elvis AI Analytics | Zjedz.it</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }
        h1 {
            font-size: 2rem;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .report-card {
            background: var(--card);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .glimpse {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }
        .stat h3 {
            margin: 0;
            font-size: 0.9rem;
            color: #94a3b8;
        }
        .stat p {
            margin: 10px 0 0;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
        }
        .ai-content {
            line-height: 1.6;
            color: #cbd5e1;
            white-space: pre-wrap;
        }
        .btn-generate {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .btn-generate:hover {
            transform: scale(1.05);
        }
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Elvis AI Business Intelligence</h1>
            <button class="btn-generate" onclick="generateReport()">Generuj Nowy Raport</button>
        </header>

        <div class="glimpse">
            <div class="stat">
                <h3>Kto?</h3>
                <p>Grupy 3+</p>
            </div>
            <div class="stat">
                <h3>Kiedy?</h3>
                <p>13:45 peak</p>
            </div>
            <div class="stat">
                <h3>Co?</h3>
                <p>Double Elvis</p>
            </div>
            <div class="stat">
                <h3>Gdzie?</h3>
                <p>Ogródek</p>
            </div>
        </div>

        <div class="report-card">
            <div id="loading" class="loading">Analizuję dane zamówień...</div>
            <div id="reportContent" class="ai-content">
                Wybierz "Generuj Raport", aby uruchomić silnik AI Gemini i przeanalizować historię sprzedaży.
            </div>
        </div>
    </div>

    <script>
        async function generateReport() {
            const content = document.getElementById('reportContent');
            const loader = document.getElementById('loading');
            
            content.style.opacity = '0.3';
            loader.style.display = 'block';

            try {
                const res = await fetch('/api/ai/analytics/report');
                const data = await res.json();
                
                if (data.success) {
                    content.innerText = data.report;
                } else {
                    content.innerText = "Błąd: " + data.error;
                }
            } catch (e) {
                content.innerText = "Błąd połączenia z API.";
            } finally {
                content.style.opacity = '1';
                loader.style.display = 'none';
            }
        }
    </script>
</body>
</html>
