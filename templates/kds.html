<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{{ brand }} KDS | Kuchnia</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --gold: #d4af37;
            --ticket-new: #fff9c4;
            --ticket-prep: #e3f2fd;
            --ticket-ready: #e8f5e9;
            --red: #b71c1c;
        }

        body { 
            background: var(--bg); 
            color: #fff; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            padding: 10px; 
            margin: 0; 
            overflow-x: hidden;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background: #111;
            border-bottom: 2px solid #333;
            margin-bottom: 20px;
            border-radius: 10px;
        }

        h1 { color: var(--gold); margin: 0; font-size: 1.5em; font-weight: 900; text-transform: uppercase; }

        #clock { font-family: monospace; font-size: 1.5em; color: #888; }

        #grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); 
            gap: 20px; 
            align-items: start; 
        }

        /* --- STYL BONU --- */
        .ticket { 
            background: var(--ticket-new); 
            color: #000; 
            padding: 0; 
            border-radius: 12px; 
            border-top: 12px solid var(--red); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        /* Bon w przygotowaniu */
        .ticket.prep-ticket { border-top-color: #1976d2; background: var(--ticket-prep); }
        
        /* Bon gotowy (czeka na kelnera) */
        .ticket.ready-ticket { border-top-color: #2e7d32; background: var(--ticket-ready); opacity: 0.7; }

        /* Alert dla starych bonów (>10 min) */
        .late-ticket { animation: pulse-border 1.5s infinite alternate; }
        @keyframes pulse-border {
            from { box-shadow: 0 0 10px rgba(183, 28, 28, 0.5); }
            to { box-shadow: 0 0 30px rgba(183, 28, 28, 1); }
        }

        .ticket-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 12px 15px;
            border-bottom: 2px dashed #bbb;
        }

        .ticket-header h2 { margin: 0; font-size: 1.4em; font-weight: 900; }
        
        .timer { 
            font-size: 1.3em; 
            font-weight: bold; 
            background: #000; 
            color: #fff; 
            padding: 5px 10px; 
            border-radius: 6px; 
        }

        .ticket-body { padding: 10px 15px; }

        .line { 
            border-bottom: 1px solid rgba(0,0,0,0.1); 
            padding: 12px 0; 
            display: flex; 
            flex-direction: column; 
            gap: 8px;
        }

        .line:last-child { border-bottom: none; }

        .item-info { display: flex; align-items: center; font-size: 1.2em; }

        .qty { 
            font-weight: 900; 
            background: #000; 
            color: #fff; 
            padding: 2px 10px; 
            border-radius: 4px; 
            margin-right: 12px; 
            min-width: 30px;
            text-align: center;
        }

        .note { 
            color: #b71c1c; 
            font-weight: bold; 
            font-size: 0.95em; 
            background: rgba(183, 28, 28, 0.1); 
            padding: 8px; 
            border-radius: 6px; 
            border-left: 4px solid var(--red);
        }

        /* --- PRZYCISKI AKCJI --- */
        .btns { display: flex; gap: 10px; margin-top: 5px; }
        
        .btn { 
            padding: 18px 10px; 
            border: none; 
            cursor: pointer; 
            font-weight: 900; 
            color: white; 
            flex: 1; 
            border-radius: 8px; 
            text-transform: uppercase; 
            font-size: 0.9em;
            box-shadow: 0 4px 0 rgba(0,0,0,0.2);
            transition: all 0.1s;
        }

        .btn:active { transform: translateY(3px); box-shadow: none; }

        .btn-smaz { background: #f57c00; }
        .btn-gotowe { background: #2e7d32; }
        
        .btn-status { background: #444; color: #aaa; cursor: default; }

        /* Wynos ma inny kolor nagłówka */
        .wynos-header { background: #311b92; color: #fff !important; }

    </style>
</head>
<body>

    <header>
        <h1>🔥 {{ brand }} KDS - KUCHNIA 🔥</h1>
        <div id="clock">00:00:00</div>
    </header>

    <div id="grid">
        <!-- Bony pojawią się tutaj -->
    </div>

    <script id="server-vars" type="application/json">
        {
            "systemMode": "{{ system_mode }}",
            "nfcRequired": {{ 'true' if nfc_required else 'false' }}
        }
    </script>

    <script>
        const serverVars = JSON.parse(document.getElementById('server-vars').textContent);
        const systemMode = serverVars.systemMode;
        let globalOrders = [];
        let wakeLock = null;

        // --- ZABLOKUJ WYGASZANIE EKRANU ---
        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                    console.log('🛡️ Ekran zablokowany (Always On)');
                }
            } catch (err) {
                console.warn('WakeLock nieobsługiwany lub błąd:', err.message);
            }
        }

        // --- POBIERANIE DANYCH ---
        async function loadData() {
            try {
                const res = await fetch('/api/all_orders');
                const data = await res.json();
                
                // Filtr: wszystko co do kuchni i nie zamknięte
                globalOrders = data.orders.filter(o => 
                    (o.to_kitchen !== false) && 
                    o.status !== 'closed'
                );

                renderTickets();
            } catch(e) { console.error("Błąd pobierania:", e); }
        }

        function renderTickets() {
            const grid = document.getElementById('grid');
            const groups = {};

            // Grupowanie po numerze stolika/wynosu
            globalOrders.forEach(o => {
                if (!groups[o.table_number]) {
                    groups[o.table_number] = { 
                        items: {}, 
                        timestamp: o.timestamp, 
                        allReady: true 
                    };
                }
                
                // Klucz grupowania pozycji (nazwa + nota + status)
                const key = o.burger_name + (o.note || "") + o.status;
                
                if (!groups[o.table_number].items[key]) {
                    groups[o.table_number].items[key] = { 
                        name: o.burger_name, 
                        qty: 0, 
                        note: o.note, 
                        status: o.status, 
                        ids: [] 
                    };
                }
                groups[o.table_number].items[key].qty++;
                groups[o.table_number].items[key].ids.push(o.id);

                if (o.status !== 'ready') groups[o.table_number].allReady = false;
            });

            let html = '';
            for (const [tbl, group] of Object.entries(groups)) {
                let headerTitle = '';
                const isWynos = tbl.startsWith('W');
                const isReady = group.allReady;
                const isPrep = Object.values(group.items).some(i => i.status === 'preparing');
                
                if (isWynos) {
                    headerTitle = '🛵 WYNOS #' + tbl.substring(1);
                } else if (systemMode === 'foodtruck') {
                    headerTitle = '🔥 NUMER ' + tbl;
                } else {
                    headerTitle = '🪑 STÓŁ ' + tbl;
                }

                html += `
                    <div class="ticket ${isReady ? 'ready-ticket' : (isPrep ? 'prep-ticket' : '')}" id="t-${tbl}" data-time="${group.timestamp}">
                        <div class="ticket-header ${isWynos ? 'wynos-header' : ''}">
                            <h2>${headerTitle}</h2>
                            <div class="timer" id="timer-${tbl}">00:00</div>
                        </div>
                        <div class="ticket-body">
                            ${Object.values(group.items).map(item => {
                                let buttons = '';
                                if(item.status === 'nowe') {
                                    buttons = `<button class="btn btn-smaz" onclick="upd('${item.ids.join(',')}', 'preparing')">ROZPOCZNIJ (SMAŻ)</button>`;
                                } else if(item.status === 'preparing') {
                                    buttons = `
                                        <button class="btn btn-status" disabled>🔥 SMAŻY SIĘ</button>
                                        <button class="btn btn-gotowe" onclick="upd('${item.ids.join(',')}', 'ready')">GOTOWE</button>
                                    `;
                                } else {
                                    buttons = `<button class="btn btn-status" disabled>✅ CZEKA NA WYDANIE</button>`;
                                }

                                return `
                                    <div class="line">
                                        <div class="item-info">
                                            <span class="qty">${item.qty}x</span>
                                            <span style="font-weight:900;">${item.name}</span>
                                        </div>
                                        ${item.note ? `<div class="note">⚠️ ${item.note}</div>` : ''}
                                        <div class="btns">${buttons}</div>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    </div>
                `;
            }

            grid.innerHTML = html || `<div style="grid-column: 1/-1; text-align: center; margin-top: 100px; color: #444;">
                <h2 style="font-size: 3em;">☕ Kuchnia czysta!</h2>
                <p>Odpocznij chwilę, Elvis pilnuje zamówień.</p>
            </div>`;
            
            updateTimers(); // Odśwież zegary natychmiast po renderze
        }

        // --- AKTUALIZACJA STATUSU ---
        async function upd(idsStr, s) {
            const ids = idsStr.split(',');
            await Promise.all(ids.map(id => 
                fetch(`/api/update_status/${id}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({status: s})
                })
            ));
            loadData(); // Odśwież widok
        }

        // --- ZEGARY (TICKER) ---
        function updateTimers() {
            const tickets = document.querySelectorAll('.ticket');
            const now = new Date();

            tickets.forEach(t => {
                const startTime = new Date(t.getAttribute('data-time'));
                const diff = Math.floor((now - startTime) / 1000);
                
                if (diff < 0) return;

                const min = Math.floor(diff / 60);
                const sec = (diff % 60).toString().padStart(2, '0');
                
                const timerEl = document.getElementById(`timer-${t.id.split('-')[1]}`);
                if (timerEl) {
                    timerEl.innerText = `${min}:${sec}`;
                    
                    // Alert po 10 minutach (600 sekund)
                    if (min >= 10) t.classList.add('late-ticket');
                    else t.classList.remove('late-ticket');
                }
            });
        }

        // --- DOSTĘP I WEBSOCKET ---
        function checkAccess() {
            // Jeśli administrator wyłączył NFC/PIN globanie -> wpuść bez pytania
            if (serverVars.nfcRequired === false) return true;

            const pin = localStorage.getItem('staff_pin');
            const role = localStorage.getItem('staff_role');
            if(!pin || !['kds', 'admin', 'master'].includes(role)) {
                window.location.href = '/portal';
                return false;
            }
            return true;
        }

        function startApp() {
            if (serverVars.nfcRequired === false) {
                console.log("NFC Bypass Active");
                const overlay = document.getElementById("lock-overlay");
                if (overlay) overlay.style.display = "none";
            } else if(!checkAccess()) return;
            
            loadData();
            requestWakeLock();
            
            // Zegar główny
            setInterval(() => {
                document.getElementById('clock').innerText = new Date().toLocaleTimeString();
                updateTimers();
            }, 1000);

            // WebSocket dla Real-Time
            function connectWebSocket() {
                const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                const ws = new WebSocket(`${protocol}//${window.location.host}/ws`);
                
                ws.onmessage = function(event) {
                    try {
                        const data = JSON.parse(event.data);
                        if (data.type === 'update' || data.type === 'NEW_ORDER') loadData();
                    } catch (e) {}
                };

                ws.onclose = () => setTimeout(connectWebSocket, 3000);
            }
            connectWebSocket();
        }

        // Uruchom przy starcie i przy powrocie do karty
        startApp();
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') requestWakeLock();
        });
    </script>
</body>
</html>
